name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: lab01-structure-and-content
      id: lab01-structure-and-content
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: lab01-structure-and-content
        setup-command: ''
        command: python3 .github/scripts/check_lab01.py
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        LAB01-STRUCTURE-AND-CONTENT_RESULTS: "${{steps.lab01-structure-and-content.outputs.result}}"
      with:
        runners: lab01-structure-and-content
